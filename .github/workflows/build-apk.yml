name: Build PWA to APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install PWA Builder CLI (Bubblewrap)
      run: npm install -g @bubblewrap/cli

    - name: Generate TWA Project
      run: bubblewrap build --dir /home/ubuntu/aktbar_project --output-dir ./app-release
      working-directory: /home/ubuntu/aktbar_project

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: /home/ubuntu/aktbar_project/app-release/*.apk
